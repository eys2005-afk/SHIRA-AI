# ==========================================================================
# הגדרות הסוכן - יומן דיונים (שירה) -> הקלטות (Verbit)
#
# הקובץ הזה הוא "לוח הבקרה" של הסוכן. כל מה שתלוי במסכים של שירה ושל
# Verbit (כתובות, selectors) מרוכז כאן, כדי שכיול מול המערכות האמיתיות
# לא ידרוש שינוי קוד - רק עדכון של הקובץ הזה.
#
# שדות שמסומנים TODO חייבים להיות מושלמים בכיול על מחשב העבודה
# (ראה README - "שלב הכיול").
# ==========================================================================

shira:
  # יומן הדיונים של ההרכב בשירה (רשת פנימית)
  calendar_url: "http://shira2/classic/Forms/Meeting/Calendar/AssemblyCalendar.aspx?AssemblyID=107"

  # הדפדפן שדרכו שירה מזוהה אוטומטית. הסוכן מריץ עותק של אותו דפדפן עם
  # פרופיל קבוע משלו, כך שההזדהות האוטומטית (SSO ארגוני) נשמרת בין ריצות.
  # msedge / chrome - דפדפן ממותג עם SSO ארגוני (מומלץ). אם הוא לא מותקן
  # הסוכן ינסה אוטומטית את הממותג השני. "chromium" (או ריק) = ה-Chromium
  # המצורף ל-Playwright, בלי הזדהות SSO - לבדיקות מקומיות בלבד.
  browser_channel: "msedge"
  profile_dir: "~/.hearing-agent/shira-profile"

  # היומן הוא רכיב DayPilot: כל דיון הוא div עם מאפיין title שמכיל את כל
  # הפרטים בשורה אחת ("עיון - 1597286/1, תיק ארכיב, פלוני, אלמונית (21:00 - 21:15)...").
  # לכן רק hearing_row מוגדר, והשאר ריקים בכוונה - הפרטים מפוענחים מהטקסט.
  selectors:
    hearing_row: "#DayPilotCalendar1_events div[title]"
    case_number: ""                # ריק בכוונה - מפוענח מתוך שורת ה-title
    case_title: ""                 # ריק בכוונה
    hearing_time: ""               # ריק בכוונה
    parties: ""                    # ריק בכוונה

verbit:
  # איך הסוכן מדבר עם Verbit:
  #   api     - דרך ה-API שלהם (הדרך האמינה; דורש מפתח - ראה README)
  #   browser - אוטומציה של ממשק הווב (ברירת מחדל עד שה-API יעבוד)
  mode: "browser"

  # --- מצב browser ---
  base_url: "https://orders.verbit.co/orders"
  profile_dir: "~/.hearing-agent/verbit-profile"

  # Verbit מזדהה עם סיסמה (לא SSO ארגוני), ולכן הוא רץ ב-Chromium המצורף
  # ל-Playwright - חלון מבודד משלו שלא מתנגש ב-Edge הרגיל שלך (הרצה ב-Edge
  # במקביל לדפדפן פתוח סגרה מיד את חלון הסוכן). הרץ פעם אחת:
  #   python -m playwright install chromium
  # אם בכל זאת רוצים דפדפן ממותג - הגדר כאן "msedge" או "chrome".
  browser_channel: "chromium"

  # הדוברים שמוסיפים בעורך התמלול לפני כל הקלטה (בסדר הזה)
  speakers:
    - "בית הדין"
    - "הבעל"
    - "האשה"
    - 'ב"כ הבעל'
    - 'ב"כ האשה'

  # קביעת דיון חדש - מסך "New live order" של Verbit (כפתור "Place new order").
  # הערכים כאן ממלאים את השדות הנדרשים בטופס; ה-selectors עצמם מקודדים
  # ב-agent/verbit.py לפי תוויות הטופס (Session name / Input language וכו').
  scheduling:
    enabled: true                  # false = הדשבורד רק יציג דיונים בלי לקבוע
    media_source: "Verbit Connect (On-Site)"  # שדה חובה: Audio source
    input_language: "Hebrew"       # שדה חובה בטופס Verbit
    output_language: "Hebrew"      # שדה חובה בטופס Verbit
    default_duration_minutes: 60   # אורך דיון כשאין שעת סיום ביומן
    add_parties_as_terms: true     # לרשום את צדדי הדיון בשדה Terms (עזר לתמלול)

  selectors:
    # זרימת ההקלטה: לחיצה על הדיון ביומן -> Actions -> Edit transcript
    actions_button: 'button:has-text("Actions")'
    edit_transcript_item: 'text=Edit transcript'
    # עורך התמלול (trax.verbit.co): הוספת דוברים והפעלת הקלטה
    speaker_name_input: 'input[placeholder="Type a Name"]'
    add_speaker_button: 'button:has-text("Add Speaker")'
    record_button: ""              # TODO: הכפתור האדום - דורש HTML של העורך
    stop_recording_button: 'button:has-text("Stop recording")'
    # קביעת דיון חדש ביומן - טרם כויל (איך נוצר דיון חדש? New session? Duplicate?)
    new_session_button: ""         # TODO
    session_name_input: ""         # TODO
    session_time_input: ""         # TODO
    participant_input: ""          # TODO
    save_button: ""                # TODO

  # --- מצב api ---
  api:
    base_url: ""                   # TODO: כתובת ה-API (מהתיעוד/התמיכה של Verbit)
    # המפתח עצמו נשמר ב-.env (VERBIT_API_TOKEN), לא כאן.

# גורמים קבועים שמצורפים לכל דיון, בנוסף לצדדים שנקראים מהיומן של אותו יום.
# אפשר להשאיר ריק אם הכול נגזר מהיומן.
fixed_participants:
  - name: ""                       # למשל: שם הדיין/שופט
    role: ""                       # למשל: אב בית הדין
  # - name: ""
  #   role: "קלדנית"

dashboard:
  host: "127.0.0.1"                # מקומי בלבד - לא נגיש מבחוץ
  port: 8765

storage:
  data_dir: "data"                 # שם נשמרים קבצי היום, לוגים וצילומי כיול
